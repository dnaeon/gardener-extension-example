apiVersion: operator.gardener.cloud/v1alpha1
kind: Extension
metadata:
  name: gardener-extension-example
  annotations:
    security.gardener.cloud/pod-security-enforce: baseline
spec:
  deployment:
    admission:
      runtimeCluster:
        helm:
          ociRepository:
            ref: registry.local.gardener.cloud:5001/helm-charts/gardener-extension-example-admission-runtime:v0.1.0-dev
      virtualCluster:
        helm:
          ociRepository:
            ref: registry.local.gardener.cloud:5001/helm-charts/gardener-extension-example-admission-virtual:v0.1.0-dev
    extension:
      helm:
        ociRepository:
          ref: registry.local.gardener.cloud:5001/helm-charts/gardener-extension-example:v0.1.0-dev
  resources:
    - kind: Extension
      type: example
      workerlessSupported: true
      clusterCompatibility:
        - shoot
      lifecycle:
        reconcile: BeforeKubeAPIServer
        delete: AfterKubeAPIServer
        migrate: AfterKubeAPIServer
